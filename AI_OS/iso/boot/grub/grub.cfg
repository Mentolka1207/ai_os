## =============================================================================
## AI_OS — GRUB2 конфигурация
## File: iso/boot/grub/grub.cfg
## Desc: Загружает ядро AI_OS через Multiboot2
## =============================================================================

# Таймаут меню загрузки (секунды)
set timeout=5
set default=0

# Цветовая схема
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "AI_OS v0.0.1-prealpha (x86_64)" {
    echo "Loading AI_OS kernel..."
    multiboot2 /boot/aios_kernel.elf
    echo "Booting..."
    boot
}

menuentry "AI_OS (Debug mode)" {
    echo "Loading AI_OS kernel (debug)..."
    multiboot2 /boot/aios_kernel.elf debug
    boot
}
